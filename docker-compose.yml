services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: messagebus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: messagebus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: messagebus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  app:                                     # <-- ADD THIS SERVICE
    build: .
    container_name: messagebus-app
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # In Docker networking, "localhost" doesn't work! 
      # We must use the name of the rabbitmq service.
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - ENVIRONMENT=production
    ports:
      # Expose metrics port so Prometheus can scrape it
      - "9100:9100"